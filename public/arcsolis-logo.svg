<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" role="img" aria-labelledby="title desc">
  <title id="title">ArcSolis logo</title>
  <desc id="desc">Stylised sun rising over an arc with the words Arc Solis</desc>
  <defs>
    <linearGradient id="sunGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7b23a" />
      <stop offset="100%" stop-color="#d97b1a" />
    </linearGradient>
  </defs>
  <rect width="400" height="140" fill="white" />
  <path d="M40 90 Q 200 20 360 90" fill="none" stroke="#1b3154" stroke-width="6" stroke-linecap="round" />
  <circle cx="250" cy="70" r="26" fill="url(#sunGradient)" />
  <g stroke="#f2a121" stroke-width="3" stroke-linecap="round">
    <line x1="250" y1="30" x2="250" y2="48" />
    <line x1="230" y1="34" x2="238" y2="50" />
    <line x1="270" y1="34" x2="262" y2="50" />
    <line x1="222" y1="48" x2="236" y2="58" />
    <line x1="278" y1="48" x2="264" y2="58" />
  </g>
  <text x="70" y="118" font-family="'Georgia', 'Times New Roman', serif" font-size="30" letter-spacing="3" fill="#1b3154">ARC</text>
  <text x="170" y="118" font-family="'Georgia', 'Times New Roman', serif" font-size="30" letter-spacing="3" fill="#d97b1a">SOLIS</text>
</svg>
